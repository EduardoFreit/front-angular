<div class="dialog-container">
    <div class="dialog-header" [ngClass]="data.type">
        <mat-icon [ngClass]="iconClass">{{ iconName }}</mat-icon>
        <h2>{{ data.title }}</h2>
    </div>

    <div mat-dialog-content class="dialog-content">
        <p>{{ data.message }}</p>
    </div>

    <div mat-dialog-actions class="actions-center">
        <button mat-button (click)="onCancel()" class="btn-cancel"
            *ngIf="(data.type === 'error' && data.showCancel) || data.type === 'confirm'">
            {{ data.cancelText || 'Cancelar' }}
        </button>
        <button mat-raised-button (click)="onOk()"
            [ngClass]="data.type === 'success' ? 'btn-success' : data.type === 'confirm' ? 'btn-confirm' : 'btn-error'">
            {{ data.confirmText || 'OK' }}
        </button>
    </div>
</div>
