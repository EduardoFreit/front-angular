<div class="dialog-container">
    <div class="dialog-header" [ngClass]="data.type">
        <mat-icon [ngClass]="iconClass">{{ iconName }}</mat-icon>
        <h2>{{ data.title }}</h2>
    </div>

    <div mat-dialog-content class="dialog-content">
        <p>{{ data.message }}</p>
    </div>

    <div mat-dialog-actions
        [ngClass]="{'actions-center': data.type === 'success', 'actions-end': data.type === 'error'}">
        <button mat-button (click)="onCancel()" class="btn-cancel" *ngIf="data.type === 'error'">
            {{ data.cancelText || 'Cancelar' }}
        </button>
        <button mat-raised-button (click)="onOk()" [ngClass]="data.type === 'success' ? 'btn-success' : 'btn-error'">
            {{ data.confirmText || 'OK' }}
        </button>
    </div>
</div>
