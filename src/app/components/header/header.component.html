<mat-toolbar class="app-toolbar">
  <div class="toolbar-content">
    <button mat-icon-button (click)="onToggleMenu()" class="menu-toggle">
      <mat-icon>menu</mat-icon>
    </button>

    <span class="app-title">Gerenciador de Projetos</span>
    <span class="spacer"></span>

    <button
      mat-icon-button
      [matMenuTriggerFor]="menu"
      class="user-menu"
      matTooltip="{{ userName }}"
    >
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item disabled class="user-name-menu">
        <mat-icon>person</mat-icon>
        <span>{{ userName }}</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()" class="logout-button">
        <mat-icon>logout</mat-icon>
        <span>Sair</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
